# docker-compose.yml для Chainlit-проекта (версия 2.1)
# Используется как шаблон для деплоя новых версий.
# Все настройки, которые должны различаться между версиями, вынесены в .env.

services:
  # ========== PostgreSQL с расширением pgvector ==========
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strong_password_here}
      POSTGRES_DB: chainlit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d chainlit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Ollama (сервер LLM) ==========
  ollama:
    image: ollama/ollama:latest
    restart: always
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - /home/bybyscan/dev/models:/root/.ollama/models   # общая папка для моделей
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Инициализация моделей Ollama ==========
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: /bin/sh
    command: >
      -c "
        echo 'Загрузка модели llava:7b...';
        ollama pull llava:7b;
        echo 'Загрузка основной модели saiga-llama3-8b...';
        ollama pull akdengi/saiga-llama3-8b;
        echo 'Готово';
        exit 0
      "
    restart: "no"

  # ========== Инициализация базы данных ==========
  db-init:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./chainlit-datalayer:/app
    environment:
      DATABASE_URL: postgresql://app_user:${POSTGRES_PASSWORD:-strong_password_here}@db:5432/chainlit_db
    command: sh -c "npm install && npx prisma migrate deploy"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ========== History API ==========
  history-api:
    build:
      context: .
      dockerfile: Dockerfile.history-api
    restart: always
    environment:
      DATABASE_URL: postgresql://app_user:${POSTGRES_PASSWORD:-strong_password_here}@db:5432/chainlit_db
    depends_on:
      db:
        condition: service_healthy

  # ========== Основное приложение Chainlit ==========
  chainlit:
    build: .
    restart: always
    expose:
      - "8000"
    volumes:
      - ./.chainlit/config.toml:/app/.chainlit/config.toml
      - ./.chainlit/translations/ru.json:/app/.chainlit/translations/ru.json
      - ./uploads:/app/uploads                 # постоянное хранилище для загруженных файлов (основное)
      - ./.files:/app/.files                   # постоянное хранилище для временных файлов Chainlit (чтобы не терялись)
      - ./app.py:/app/app.py
      - ./modules:/app/modules
      - ./public:/app/public
    env_file:
      - .env
    environment:
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://app_user:${POSTGRES_PASSWORD:-strong_password_here}@db:5432/chainlit_db
      OLLAMA_API_URL: http://ollama:11434/api/chat
      OLLAMA_GENERATE_URL: http://ollama:11434/api/generate
      MULTIMODAL_IMAGE_MODEL: llava:7b
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-change_me}
      CHAINLIT_STORAGE_DIR: /app/uploads        # указываем папку для хранения загруженных файлов
      AUDIO_TRANSCRIBER_API_URL: ${AUDIO_TRANSCRIBER_API_URL:-http://host.docker.internal:9090/api/v1/transcribe}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # <-- КЛЮЧЕВОЕ ДОБАВЛЕНИЕ
    command: chainlit run app.py --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  # ========== Nginx (обратный прокси, HTTPS) ==========
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${NGINX_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - chainlit
      - history-api

volumes:
  postgres_data:
    name: ${PROJECT_NAME:-chainlit-dev}-postgres-data
  ollama_data:
    name: ${PROJECT_NAME:-chainlit-dev}-ollama-data
