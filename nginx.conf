events {
    worker_connections 1024;
}

http {
    # Увеличиваем максимальный размер тела запроса до 100 МБ
    client_max_body_size 100M;

    # Таймауты для долгих загрузок файлов
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;

    # Отключаем буферизацию прокси (важно для потоковых ответов и больших файлов)
    proxy_buffering off;
    proxy_request_buffering off;

    # Стандартные прокси-заголовки
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    # Сжатие (опционально)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Основной прокси на Chainlit (с поддержкой WebSocket)
        location / {
            proxy_pass http://chainlit:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Таймауты для WebSocket и долгих запросов
            proxy_read_timeout 3600s;
            proxy_connect_timeout 75s;
        }

        # Прокси для history-api
        location /history-api/ {
            proxy_pass http://history-api:8000/;
            proxy_set_header X-User-ID $http_x_user_id;
            proxy_read_timeout 300s;
        }
    }
}
